<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Season Setup · CricketClubApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/tailwind.css?v=20260426a" />
    <link rel="stylesheet" href="/assets/styles.css?v=20260509f" />
  </head>
  <body>
    <div class="page-shell">
      <header class="page-topbar"></header>
      <section class="panel onboarding-panel">
        <div class="stack-card">
          <h1 id="seasonSetupTitle" hidden>Club season setup</h1>
          <p id="seasonSetupSummary" class="lede" hidden>Create fixtures for 2026 and later.</p>
          <div id="seasonStatus" class="status-banner" hidden></div>
          <form id="seasonSetupForm" class="form-grid">
            <input id="editingFixtureId" type="hidden" value="" />
            <input id="seasonYear" type="number" min="2026" placeholder="Season year" required />
            <input id="fixtureDate" type="date" required />
            <input id="fixtureDateLabel" type="text" placeholder="Date label e.g. June 7th" required />
            <input id="fixtureOpponent" type="text" placeholder="Opponent club" required />
            <input id="fixtureVenue" type="text" placeholder="Venue" />
            <input id="fixtureType" type="text" placeholder="Match type" />
            <input id="fixtureTime" type="text" placeholder="Start time" />
            <input id="fixtureOvers" type="text" placeholder="Overs" />
            <button id="fixtureSubmitButton" class="primary-button wide" type="submit">Add fixture</button>
            <button id="fixtureCancelEditButton" class="secondary-button wide" type="button" hidden>Cancel edit</button>
          </form>
          <div class="inline-actions">
            <label class="stack-field" for="seasonFilter">
              <span>Show season</span>
              <select id="seasonFilter"></select>
            </label>
          </div>
          <div id="seasonFixtures" class="detail-stack"></div>
        </div>
      </section>
    </div>
    <script src="/assets/multipage.js?v=20260509e"></script>
    <script src="/assets/season_setup.js?v=20260509b"></script>
  </body>
</html>
